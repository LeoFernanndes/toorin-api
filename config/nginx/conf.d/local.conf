upstream meu_servidor {
# docker will automatically resolve this to the correct address
# because we use the same name as the service: "djangoapp"
least_conn;

server djangoapp1:8000 weight=10 max_fails=3 fail_timeout=30;
server djangoapp2:8000 weight=10 max_fails=3 fail_timeout=30;
server djangoapp3:8000 weight=10 max_fails=3 fail_timeout=30;

keepalive 64;
}

# now we declare our main server
server {

    listen 80;
    server_name 0.0.0.0;

    location / {
        # everything is passed to Gunicorn
        proxy_pass http://meu_servidor;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_redirect off;
    }




    # listen 80;
    # server_name 0.0.0.0;
